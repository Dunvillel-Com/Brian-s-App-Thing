<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 4926 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div>
            <div class="sidebar-header">
                <h2>Team Portal</h2>
            </div>
            
            <ul class="nav-links">
                <li><a href="#">Dashboard Home</a></li>
                <li id="whiteboard-link" style="display: none;">
                    <a href="Drawing App/drawing_App_Index.html">Whiteboard Tool</a>
                </li> 
            </ul>
        </div>

        <div class="sidebar-bottom">
            <div class="dropdown-container">
                <button class="dropdown-btn" id="role-btn">
                    Select Role <span class="arrow">&#9660;</span>
                </button>
                <ul class="dropdown-menu" id="role-menu">
                    <li><a href="#" class="role-option" data-role="Pit Scout">Pit Scout</a></li>
                    <li><a href="#" class="role-option" data-role="Scout">Scout</a></li>
                    <li><a href="#" class="role-option" data-role="Lead Scout">Lead Scout</a></li>
                    <li><a href="#" class="role-option" data-role="Pit Crew">Pit Crew</a></li>
                    <li><a href="#" class="role-option" data-role="Drive Team">Drive Team</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="main-content" class="main-content">
        <header>
            <button id="toggle-btn" class="toggle-btn">&#9776; Menu</button>
            <div class="user-status">
                Current Role: <span id="current-role-display" class="highlight">None Selected</span>
            </div>
        </header>
        
        <div class="content-area">
            <h1>Welcome to the Dashboard</h1>
            <p>Use the sidebar to select your team role to unlock specific tools.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
