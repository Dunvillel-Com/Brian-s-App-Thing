<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 4926 GalacTech Webapp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="tool-group">
                <button id="btn-brush" class="tool-btn active">Brush</button>
                <button id="btn-eraser" class="tool-btn">Eraser</button>
                <button id="btn-home" class="tool-btn" onclick="window.location.href='/Frontend/index.html'">Home</button>
            </div>
            
            <div class="tool-group colors">
                <div class="color-swatch active" style="background-color: #000000;" data-color="#000000"></div>
                <div class="color-swatch" style="background-color: #020202;" data-color="#FF3B30"></div>
                <div class="color-swatch" style="background-color: #4CD964;" data-color="#4CD964"></div>
                <div class="color-swatch" style="background-color: #007AFF;" data-color="#007AFF"></div>
                <div class="color-swatch" style="background-color: #FFCC00;" data-color="#FFCC00"></div>
            </div>

            <div class="tool-group">
                <label for="brush-size">Size: <span id="size-label">5</span></label>
                <input type="range" id="brush-size" min="1" max="50" value="5">
            </div>

            <div class="tool-group">
                <button id="btn-clear" class="action-btn">Clear Canvas</button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="drawing-canvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
